version: '3.8'

services:
  # ==========================================
  # Database Service (Simulates AWS RDS Locally)
  # ==========================================
  db:
    image: postgres:15-alpine
    container_name: resuscreen-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: resume_screening_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # ==========================================
  # Backend API Server Service
  # ==========================================
  backend:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: resuscreen-backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=development
      - DB_HOST=db
      - DB_USER=postgres
      - DB_PASSWORD=postgrespassword
      - DB_DATABASE=resume_screening_db
      - DB_PORT=5432
    depends_on:
      - db

  # ==========================================
  # Frontend Static Nginx Web Service
  # ==========================================
  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/Dockerfile.frontend
    container_name: resuscreen-frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
