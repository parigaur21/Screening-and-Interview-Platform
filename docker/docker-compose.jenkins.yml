services:
  # ==========================================
  # Jenkins CI/CD Server
  # ==========================================
  jenkins:
    image: jenkins/jenkins:lts
    container_name: jenkins-server
    restart: always
    ports:
      - "8082:8080"      # Jenkins UI mapped to a free host port
      - "50000:50000"    # Jenkins agent port
    environment:
      - JENKINS_OPTS=--httpPort=8080
      - JAVA_OPTS=-Xmx2g -Xms512m
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/bin/docker:/usr/bin/docker
    networks:
      - devops-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/login"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    labels:
      - "com.example.description=Jenkins CI/CD Server"

  # ==========================================
  # PostgreSQL Database (for Jenkins)
  # ==========================================
  jenkins-db:
    image: postgres:15-alpine
    container_name: jenkins-db
    restart: always
    environment:
      POSTGRES_USER: jenkins
      POSTGRES_PASSWORD: jenkins_password
      POSTGRES_DB: jenkins_db
    ports:
      - "5433:5432"
    volumes:
      - jenkins_db_data:/var/lib/postgresql/data
    networks:
      - devops-network
    labels:
      - "com.example.description=Jenkins Database"

  # ==========================================
  # Docker Registry (Private)
  # ==========================================
  registry:
    image: registry:2
    container_name: docker-registry
    restart: always
    ports:
      - "5001:5000"
    volumes:
      - registry_data:/var/lib/registry
    environment:
      REGISTRY_HTTP_ADDR: 0.0.0.0:5000
    networks:
      - devops-network
    labels:
      - "com.example.description=Private Docker Registry"


  # ==========================================
  # Nginx Reverse Proxy (Optional)
  # ==========================================
  # nginx:
  #   image: nginx:alpine
  #   container_name: devops-nginx
  #   restart: always
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx-devops.conf:/etc/nginx/nginx.conf:ro
  #     - ./certs:/etc/nginx/certs:ro
  #   depends_on:
  #     - jenkins
  #   networks:
  #     - devops-network

volumes:
  jenkins_home:
    driver: local
  jenkins_db_data:
    driver: local
  registry_data:
    driver: local

networks:
  devops-network:
    driver: bridge
